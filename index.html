<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAYS · Shipping Calculators</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:       #1a1a18;
  --choc:      #4a3424;
  --sand:      #f5f0e8;
  --clay:      #c8a97e;
  --clay-dark: #a8845a;
  --clay-pale: #ecdfc8;
  --smoke:     #6b6860;
  --fog:       #e4dfd6;
  --white:     #fdfcfa;
}
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--sand);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: var(--choc);
  padding: 22px 48px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.brand { display: flex; align-items: baseline; gap: 14px; }
.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 36px; color: var(--clay);
  letter-spacing: 0.1em; line-height: 1;
}
.brand-sub {
  font-size: 10.5px; font-weight: 600; color: #e8ddc8;
  letter-spacing: 0.22em; text-transform: uppercase;
}
.header-q { font-size: 13px; color: #e8ddc8; font-style: italic; }
.clay-bar {
  background: var(--clay);
  padding: 10px 48px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.clay-bar span {
  font-size: 11px; font-weight: 600; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--ink);
}
.clay-bar .dot { opacity: 0.3; }

/* MAIN */
.main {
  flex: 1; max-width: 880px; width: 100%;
  margin: 0 auto; padding: 48px 32px 64px;
}

/* INTRO */
.page-intro { text-align: center; margin-bottom: 40px; }
.page-intro h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 32px; font-weight: 400; color: var(--ink);
  margin-bottom: 10px;
}
.page-intro p { font-size: 15px; color: var(--smoke); line-height: 1.6; }

/* COLLECTION SECTION */
.collection {
  margin-bottom: 44px;
}
.collection-head {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 6px;
}
.collection-name {
  font-family: 'DM Serif Display', serif;
  font-size: 23px; color: var(--ink);
}
.collection-status {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 20px;
}
.status-open   { background: #dcefe0; color: #2f6b43; }
.status-soon   { background: var(--clay-pale); color: var(--clay-dark); }
.status-closed { background: #efe4e0; color: #9a6b5f; }
.collection-desc {
  font-size: 13.5px; color: var(--smoke); line-height: 1.6;
  margin-bottom: 20px;
}

/* CARD GRID */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
}

/* ROUND CARD */
.round-card {
  display: block;
  text-decoration: none;
  background: var(--white);
  border: 1.5px solid var(--fog);
  border-radius: 10px;
  padding: 24px;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.round-card:hover {
  transform: translateY(-3px);
  border-color: var(--clay);
  box-shadow: 0 8px 24px rgba(74,52,36,0.12);
}
.round-card.disabled {
  pointer-events: none;
  opacity: 0.55;
}
.round-card::after {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 70px; height: 70px;
  background: var(--clay-pale);
  clip-path: polygon(100% 0, 0 0, 100% 100%);
  opacity: 0.4;
  transition: opacity 0.15s;
}
.round-card:hover::after { opacity: 0.7; }

.round-icon {
  width: 52px; height: 52px;
  background: var(--choc);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 16px;
  position: relative; z-index: 1;
}
.round-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--clay-dark);
  margin-bottom: 4px;
}
.round-title {
  font-size: 19px; font-weight: 600; color: var(--ink);
  margin-bottom: 8px;
}
.round-text {
  font-size: 13px; color: var(--smoke); line-height: 1.55;
  margin-bottom: 18px;
}
.round-cta {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; color: var(--clay-dark);
}
.round-cta .arrow { transition: transform 0.15s; }
.round-card:hover .round-cta .arrow { transform: translateX(3px); }

/* FOOTER */
.foot {
  text-align: center; padding: 24px 32px 40px;
  font-size: 12px; color: var(--smoke);
}

@media (max-width: 680px) {
  .header, .clay-bar { padding-left: 20px; padding-right: 20px; }
  .main { padding: 32px 18px 48px; }
  .header-q { display: none; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <span class="brand-name">CAYS</span>
    <span class="brand-sub">Worldwide Shipping</span>
  </div>
  <span class="header-q">Check your shipping cost</span>
</header>

<div class="clay-bar">
  <span>Ships from Thailand</span>
  <span class="dot">·</span>
  <span>105 Countries</span>
</div>

<main class="main">
  <div class="page-intro">
    <h1>Shipping Cost Calculators</h1>
    <p>Choose your pre-order round below to see how much shipping will cost to your country.</p>
  </div>

  <!-- Collections render here -->
  <div id="collections"></div>
</main>

<div class="foot">
  Prices in Thai Baht (THB) · Updated January 2026
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   ║  EDIT YOUR COLLECTIONS HERE                                               ║
   ═══════════════════════════════════════════════════════════════════════════

   To add a NEW merch collection in the future, just copy one whole { ... }
   block inside COLLECTIONS and change the details. The page rebuilds itself.

   Each collection has:
     name    : the collection title shown on the page
     status  : "open" (green) | "soon" (clay) | "closed" (muted)  — visual tag
     desc    : a short sentence describing the collection
     rounds  : a list of calculator cards. Each round card has:
         icon  : any emoji  (📦 🧥 👕 🧢 🧦 👜 etc.)
         label : small uppercase tag above the title (e.g. "Round 1")
         title : the card heading (e.g. "Boxset")
         text  : one-line description
         link  : the .html filename of that calculator (must match GitHub)
         active: true = clickable | false = greyed out "coming soon"
   ═══════════════════════════════════════════════════════════════════════════ */

const COLLECTIONS = [
  {
    name:   "Pre-Order Little Light Collection",
    status: "open",
    desc:   "Our current pre-order. Round 1 ships as a boxset; Round 2 is sold as single items.",
    rounds: [
      {
        icon:  "📦",
        label: "Round 1",
        title: "Boxset",
        text:  "1 Hoodie + 1 Boxy T-shirt shipped together. Just pick your country.",
        link:  "round1.html",
        active: true
      },
      {
        icon:  "👕",
        label: "Round 2",
        title: "Single Items",
        text:  "Choose how many hoodies and tees you want, then pick your country.",
        link:  "round2.html",
        active: true
      }
    ]
  }

  /* ── EXAMPLE: a future collection (remove the slashes to activate) ──────────
  ,{
    name:   "Winter Collection 2026",
    status: "soon",
    desc:   "Launching soon — calculators will go live when pre-orders open.",
    rounds: [
      {
        icon:  "🧥",
        label: "Round 1",
        title: "Jacket Boxset",
        text:  "Coming soon.",
        link:  "winter-round1.html",
        active: false
      }
    ]
  }
  ─────────────────────────────────────────────────────────────────────────── */
];

/* ═══════════════════════════════════════════════════════════════════════════
   Below this line: no need to edit. This builds the page from COLLECTIONS.
   ═══════════════════════════════════════════════════════════════════════════ */
const statusClass = { open: "status-open", soon: "status-soon", closed: "status-closed" };
const statusText  = { open: "Open Now",    soon: "Coming Soon", closed: "Closed" };

const container = document.getElementById('collections');

container.innerHTML = COLLECTIONS.map(col => {
  const cards = col.rounds.map(r => {
    const cls = r.active ? "round-card" : "round-card disabled";
    const href = r.active ? `href="${r.link}"` : "";
    const cta = r.active
      ? `<span class="round-cta">Open calculator <span class="arrow">→</span></span>`
      : `<span class="round-cta">Coming soon</span>`;
    return `
      <a class="${cls}" ${href}>
        <div class="round-icon">${r.icon}</div>
        <div class="round-label">${r.label}</div>
        <div class="round-title">${r.title}</div>
        <div class="round-text">${r.text}</div>
        ${cta}
      </a>`;
  }).join('');

  return `
    <section class="collection">
      <div class="collection-head">
        <span class="collection-name">${col.name}</span>
        <span class="collection-status ${statusClass[col.status]||''}">${statusText[col.status]||col.status}</span>
      </div>
      <p class="collection-desc">${col.desc}</p>
      <div class="card-grid">${cards}</div>
    </section>`;
}).join('');
</script>
</body>
</html>
